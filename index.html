<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>0007a9</title>

<style>

body{

    margin:0;

    background:#353535;

    font-family:Arial,Helvetica,sans-serif;

}

/* linker Warnstreifen */

.warning{

    position:fixed;

    left:0;
    top:0;

    width:42px;
    height:100vh;

    background:
    repeating-linear-gradient(
        -45deg,
        #ffd400 0px,
        #ffd400 18px,
        #222222 18px,
        #222222 36px
    );

    box-shadow:3px 0 12px rgba(0,0,0,.35);

}

/* gesamte Karte */

.wrapper{

    max-width:900px;

    margin:80px auto;

    padding-left:60px;

}

/* Button */

.card{

    display:block;

    background:#0007A9;

    color:white;

    text-decoration:none;

    border-radius:24px;

    padding:45px 40px;

    text-align:center;

    box-shadow:0 10px 28px rgba(0,0,0,.45);

}

/* Titel */

.card h1{

    margin:0;

    font-size:72px;

    font-weight:300;

}

/* Trennlinie */

.separator{

    width:65%;

    margin:28px auto;

    height:1px;

    background:rgba(255,255,255,.30);

}

/* Untertitel */

.card p{

    margin:0;

    font-size:22px;

    color:#eeeeee;

}

.card:hover{

    transform:translateY(-2px);

    transition:.2s;

}

</style>

</head>

<body>

<div class="warning"></div>

<div class="wrapper">

<a class="card" href="roaming.html">

<h1>H ey David</h1>

<div class="separator"></div>

<p>FLHPI • Specs • #'s • To Do's</p>

</a>

</div>

</body>

</html>
